trigger: none

variables:
  - group: mysecrets   # GIT_EMAIL, GIT_TOKEN, GIT_USERNAME

  - name: acrName
    value: 'acrdev12345'
  - name: acrServer
    value: 'acrdev12345.azurecr.io'
  - name: imageRepo
    value: 'bank-of-anthos'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: aksResourceGroup
    value: 'aks-dev-rg-west'
  - name: aksClusterName
    value: 'aks-dev'
  - name: azureServiceConnection
    value: 'azure-service-connection'
  - name: acrServiceConnection
    value: 'acr-service-connection-2'

stages:

# ═══════════════════════════════════════════════════════════════════
# STAGE 1 — BUILD & PUSH IMAGES
# ═══════════════════════════════════════════════════════════════════
- stage: Build
  displayName: '🐳 Build & Push → acrdev12345'
  jobs:

  - job: BuildPushImages
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      matrix:
        frontend:
          serviceName: 'frontend'
          dockerfilePath: 'src/frontend/Dockerfile'
          buildContext: 'src/frontend'
        userservice:
          serviceName: 'userservice'
          dockerfilePath: 'src/accounts/userservice/Dockerfile'
          buildContext: 'src/accounts/userservice'
        contacts:
          serviceName: 'contacts'
          dockerfilePath: 'src/accounts/contacts/Dockerfile'
          buildContext: 'src/accounts/contacts'
        ledgerwriter:
          serviceName: 'ledgerwriter'
          dockerfilePath: 'src/ledger/ledgerwriter/Dockerfile'
          buildContext: 'src/ledger/ledgerwriter'
        balancereader:
          serviceName: 'balancereader'
          dockerfilePath: 'src/ledger/balancereader/Dockerfile'
          buildContext: 'src/ledger/balancereader'
        transactionhistory:
          serviceName: 'transactionhistory'
          dockerfilePath: 'src/ledger/transactionhistory/Dockerfile'
          buildContext: 'src/ledger/transactionhistory'
        loadgenerator:
          serviceName: 'loadgenerator'
          dockerfilePath: 'src/loadgenerator/Dockerfile'
          buildContext: 'src/loadgenerator'

    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Build & Push $(serviceName)'
      inputs:
        command: buildAndPush
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageRepo)/$(serviceName)'
        dockerfile: '$(dockerfilePath)'
        buildContext: '$(buildContext)'
        tags: |
          $(imageTag)
          latest


# ═══════════════════════════════════════════════════════════════════
# STAGE 2 — BOOTSTRAP ARGOCD (idempotent)
# ═══════════════════════════════════════════════════════════════════
- stage: BootstrapArgoCD
  displayName: '⚙️  Bootstrap ArgoCD App'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: ApplyArgoCDApp
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Add repo to ArgoCD & apply Application manifest'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          ARGOCD_IP=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n argocd -o jsonpath='{.data.password}' | base64 -d)

          argocd login "$ARGOCD_IP" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          echo "=== Registering GitHub repo with ArgoCD ==="
          argocd repo add https://github.com/muzzammil-hamdu/bank-of-anthos.git \
            --username $(GIT_USERNAME) \
            --password $(GIT_TOKEN) \
            --upsert

          echo "=== Applying ArgoCD Application ==="
          kubectl apply -f argocd/bank-of-anthos-app.yaml
          echo "✅ ArgoCD app registered."


# ═══════════════════════════════════════════════════════════════════
# STAGE 3 — APPLY MONITORING (idempotent)
# ═══════════════════════════════════════════════════════════════════
- stage: ApplyMonitoring
  displayName: '📊 Apply Prometheus Rules, ServiceMonitor & Grafana Dashboard'
  dependsOn: BootstrapArgoCD
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: ApplyMonitoring
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Apply monitoring manifests to aks-dev'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          # Ensure namespaces exist
          kubectl create namespace bank-of-anthos --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring      --dry-run=client -o yaml | kubectl apply -f -

          echo "=== Applying PrometheusRule ==="
          kubectl apply -f monitoring/prometheus-rules.yaml

          echo "=== Applying ServiceMonitor & PodMonitor ==="
          kubectl apply -f monitoring/service-monitor.yaml

          echo "=== Applying Grafana Dashboard ConfigMap ==="
          kubectl apply -f monitoring/grafana-dashboard.yaml

          echo ""
          echo "=== Verifying resources ==="
          kubectl get prometheusrule -n bank-of-anthos
          kubectl get servicemonitor  -n bank-of-anthos
          kubectl get podmonitor      -n bank-of-anthos
          kubectl get configmap bank-of-anthos-dashboard -n monitoring

          echo "✅ Monitoring applied."


# ═══════════════════════════════════════════════════════════════════
# STAGE 4 — COMMIT UPDATED IMAGE TAGS → ArgoCD auto-syncs
# ═══════════════════════════════════════════════════════════════════
- stage: UpdateManifests
  displayName: '📝 Commit image tags → trigger ArgoCD'
  dependsOn: ApplyMonitoring
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: PatchAndCommit
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self
      persistCredentials: false
      clean: true

    - bash: |
        git config user.email "$(GIT_EMAIL)"
        git config user.name  "$(GIT_USERNAME)"

        git remote set-url origin \
          https://$(GIT_USERNAME):$(GIT_TOKEN)@github.com/muzzammil-hamdu/bank-of-anthos.git

        echo "=== Patching Google registry → acrdev12345.azurecr.io ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i \
            -e "s|gcr.io/bank-of-anthos-ci/bank-of-anthos|acrdev12345.azurecr.io/bank-of-anthos|g" \
            -e "s|us-central1-docker.pkg.dev/bank-of-anthos-ci/bank-of-anthos-serverless|acrdev12345.azurecr.io/bank-of-anthos|g" \
          {} \;

        echo "=== Stamping build tag: $(imageTag) ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i -E \
            "s|(acrdev12345\.azurecr\.io/bank-of-anthos/[^:]+):[^ ]+|\1:$(imageTag)|g" \
          {} \;

        echo "=== Diff ==="
        git diff --stat

        if git diff --quiet; then
          echo "No changes — skipping commit."
        else
          git add kubernetes-manifests/
          git commit -m "ci: bump image tags to $(imageTag) [skip ci]"
          git push origin HEAD:main
          echo "✅ Pushed — ArgoCD will detect and sync automatically."
        fi
      displayName: 'Patch manifests & push to GitHub'


# ═══════════════════════════════════════════════════════════════════
# STAGE 5 — WAIT FOR ARGOCD SYNC & PRINT APP URL
# ═══════════════════════════════════════════════════════════════════
- stage: VerifySync
  displayName: '🔍 Wait for ArgoCD sync'
  dependsOn: UpdateManifests
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: WaitForSync
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: AzureCLI@2
      displayName: 'Poll ArgoCD → Synced + Healthy'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          ARGOCD_IP=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n argocd -o jsonpath='{.data.password}' | base64 -d)

          argocd login "$ARGOCD_IP" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          echo "=== Waiting for bank-of-anthos: Synced + Healthy ==="
          argocd app wait bank-of-anthos \
            --sync \
            --health \
            --timeout 600

          echo ""
          echo "=== Pod status ==="
          kubectl get pods -n bank-of-anthos

          echo ""
          echo "=== 🌐 App URL ==="
          for i in {1..20}; do
            IP=$(kubectl get svc frontend -n bank-of-anthos \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            [[ -n "$IP" ]] && echo "🚀 Bank of Anthos live at: http://$IP" && break
            echo "  Waiting for LoadBalancer IP... ($i/20)"
            sleep 15
          done