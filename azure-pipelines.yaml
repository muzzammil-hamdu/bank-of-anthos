trigger: none

variables:
  - group: mysecrets   # GIT_EMAIL, GIT_TOKEN, GIT_USERNAME

  - name: acrName
    value: 'acrdev12345'
  - name: acrServer
    value: 'acrdev12345.azurecr.io'
  - name: imageRepo
    value: 'bank-of-anthos'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: aksResourceGroup
    value: 'aks-dev-rg-west'
  - name: aksClusterName
    value: 'aks-dev'
  - name: azureServiceConnection
    value: 'azure-service-connection'
  - name: acrServiceConnection
    value: 'acr-service-connection-2'

stages:

# ═══════════════════════════════════════════════════════════════════
# STAGE 0 — PATCH MANIFESTS (fix registry + strip sha256 digests)
# ═══════════════════════════════════════════════════════════════════
- stage: PatchManifests
  displayName: '🔧 Patch manifests → ACR + strip sha256'
  jobs:

  - job: PatchAndCommit
    pool:
      name: 'projectpool'

    steps:
    - checkout: self
      persistCredentials: false
      clean: true

    - bash: |
        git config user.email "$(GIT_EMAIL)"
        git config user.name  "$(GIT_USERNAME)"

        git remote set-url origin \
          https://$(GIT_USERNAME):$(GIT_TOKEN)@github.com/muzzammil-hamdu/bank-of-anthos.git

        echo "=== Replacing Google registry with acrdev12345.azurecr.io ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i \
            -e "s|gcr.io/bank-of-anthos-ci/bank-of-anthos|acrdev12345.azurecr.io/bank-of-anthos|g" \
            -e "s|us-central1-docker.pkg.dev/bank-of-anthos-ci/bank-of-anthos-serverless|acrdev12345.azurecr.io/bank-of-anthos|g" \
          {} \;

        echo "=== Stripping @sha256 digests ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i -E "s|@sha256:[a-f0-9]+||g" {} \;

        echo "=== Diff ==="
        git diff --stat

        if git diff --quiet; then
          echo "Already patched — no changes needed."
        else
          git add kubernetes-manifests/
          git commit -m "fix: patch registry to acrdev12345 and strip sha256 digests [skip ci]"
          git push origin HEAD:main
          echo "Pushed — ArgoCD will sync patched manifests."
        fi
      displayName: 'Patch registry refs & strip sha256'


# ═══════════════════════════════════════════════════════════════════
# STAGE 1a — BUILD Python/Docker services (frontend, userservice,
#             contacts, loadgenerator) — have real Dockerfiles
# ═══════════════════════════════════════════════════════════════════
- stage: Build
  displayName: '🐳 Build & Push All Images → acrdev12345'
  dependsOn: PatchManifests
  condition: succeeded()
  jobs:

  - job: BuildDockerServices
    displayName: 'Docker Build — Python services'
    pool:
      name: 'projectpool'
    strategy:
      matrix:
        frontend:
          serviceName: 'frontend'
          dockerfilePath: 'src/frontend/Dockerfile'
          buildContext: 'src/frontend'
        userservice:
          serviceName: 'userservice'
          dockerfilePath: 'src/accounts/userservice/Dockerfile'
          buildContext: 'src/accounts/userservice'
        contacts:
          serviceName: 'contacts'
          dockerfilePath: 'src/accounts/contacts/Dockerfile'
          buildContext: 'src/accounts/contacts'
        loadgenerator:
          serviceName: 'loadgenerator'
          dockerfilePath: 'src/loadgenerator/Dockerfile'
          buildContext: 'src/loadgenerator'

    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Build & Push $(serviceName)'
      inputs:
        command: buildAndPush
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageRepo)/$(serviceName)'
        dockerfile: '$(dockerfilePath)'
        buildContext: '$(buildContext)'
        tags: |
          $(imageTag)
          latest

  # ─────────────────────────────────────────────────────────────────
  # Java ledger services use Maven Jib (no Dockerfile) — built here
  # ─────────────────────────────────────────────────────────────────
  - job: BuildJavaServices
    displayName: 'Maven Jib Build — Java ledger services'
    pool:
      name: 'projectpool'

    steps:
    - checkout: self

    - bash: |
        sudo apt-get update -qq
        sudo apt-get install -y openjdk-17-jdk maven
        java -version
        mvn -version
      displayName: 'Install Java 17 & Maven'

    - task: AzureCLI@2
      displayName: 'ACR Login for Jib'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name acrdev12345

    - bash: |
        # Build & push ledgerwriter via Jib
        cd src/ledger/ledgerwriter
        mvn compile jib:build \
          -Djib.to.image=acrdev12345.azurecr.io/bank-of-anthos/ledgerwriter:$(imageTag) \
          -Djib.to.tags=latest \
          -Djib.to.auth.username=$(az acr credential show --name acrdev12345 --query username -o tsv) \
          -Djib.to.auth.password=$(az acr credential show --name acrdev12345 --query passwords[0].value -o tsv) \
          --no-transfer-progress
        cd ../../..

        # Build & push balancereader via Jib
        cd src/ledger/balancereader
        mvn compile jib:build \
          -Djib.to.image=acrdev12345.azurecr.io/bank-of-anthos/balancereader:$(imageTag) \
          -Djib.to.tags=latest \
          -Djib.to.auth.username=$(az acr credential show --name acrdev12345 --query username -o tsv) \
          -Djib.to.auth.password=$(az acr credential show --name acrdev12345 --query passwords[0].value -o tsv) \
          --no-transfer-progress
        cd ../../..

        # Build & push transactionhistory via Jib
        cd src/ledger/transactionhistory
        mvn compile jib:build \
          -Djib.to.image=acrdev12345.azurecr.io/bank-of-anthos/transactionhistory:$(imageTag) \
          -Djib.to.tags=latest \
          -Djib.to.auth.username=$(az acr credential show --name acrdev12345 --query username -o tsv) \
          -Djib.to.auth.password=$(az acr credential show --name acrdev12345 --query passwords[0].value -o tsv) \
          --no-transfer-progress
        cd ../../..
      displayName: 'Jib build & push ledgerwriter, balancereader, transactionhistory'


# ═══════════════════════════════════════════════════════════════════
# STAGE 2 — BOOTSTRAP ARGOCD (idempotent)
# ═══════════════════════════════════════════════════════════════════
- stage: BootstrapArgoCD
  displayName: '⚙️  Bootstrap ArgoCD App'
  dependsOn: Build
  condition: succeeded()
  jobs:

  - job: ApplyArgoCDApp
    pool:
      name: 'projectpool'

    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Add repo to ArgoCD & apply Application manifest'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          ARGOCD_IP=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n argocd -o jsonpath='{.data.password}' | base64 -d)

          argocd login "$ARGOCD_IP" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          argocd repo add https://github.com/muzzammil-hamdu/bank-of-anthos.git \
            --username $(GIT_USERNAME) \
            --password $(GIT_TOKEN) \
            --upsert

          # ── Create namespace ────────────────────────────────────
          kubectl create namespace bank-of-anthos --dry-run=client -o yaml | kubectl apply -f -

          # ── JWT secret (idempotent) ──────────────────────────────
          if ! kubectl get secret jwt-key -n bank-of-anthos &>/dev/null; then
            echo "=== Creating JWT secret ==="
            openssl genrsa -out /tmp/jwtRS256.key 4096
            openssl rsa -in /tmp/jwtRS256.key -pubout -out /tmp/jwtRS256.key.pub
            kubectl create secret generic jwt-key \
              --from-file=jwtRS256.key=/tmp/jwtRS256.key \
              --from-file=jwtRS256.key.pub=/tmp/jwtRS256.key.pub \
              -n bank-of-anthos
            rm -f /tmp/jwtRS256.key /tmp/jwtRS256.key.pub
            echo "✅ JWT secret created."
          else
            echo "✅ JWT secret already exists — skipping."
          fi

          # ── ACR image pull secret (idempotent) ──────────────────
          ACR_USERNAME=$(az acr credential show --name acrdev12345 --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name acrdev12345 --query passwords[0].value -o tsv)

          kubectl create secret docker-registry acr-secret \
            --docker-server=acrdev12345.azurecr.io \
            --docker-username=$ACR_USERNAME \
            --docker-password=$ACR_PASSWORD \
            --namespace=bank-of-anthos \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ ACR pull secret created/updated."

          # ── Apply ArgoCD Application ─────────────────────────────
          kubectl apply -f argocd/bank-of-anthos-app.yaml
          echo "✅ ArgoCD app registered."


# ═══════════════════════════════════════════════════════════════════
# STAGE 3 — APPLY MONITORING (idempotent)
# ═══════════════════════════════════════════════════════════════════
- stage: ApplyMonitoring
  displayName: '📊 Apply Prometheus, ServiceMonitor & Grafana Dashboard'
  dependsOn: BootstrapArgoCD
  condition: succeeded()
  jobs:

  - job: ApplyMonitoring
    pool:
      name: 'projectpool'

    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Apply monitoring manifests'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          kubectl create namespace bank-of-anthos --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring      --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f monitoring/prometheus-rules.yaml
          kubectl apply -f monitoring/service-monitor.yaml
          kubectl apply -f monitoring/grafana-dashboard.yaml

          echo "✅ Monitoring applied."


# ═══════════════════════════════════════════════════════════════════
# STAGE 4 — COMMIT UPDATED IMAGE TAGS → ArgoCD auto-syncs
# ═══════════════════════════════════════════════════════════════════
- stage: UpdateManifests
  displayName: '📝 Commit image tags → trigger ArgoCD'
  dependsOn: ApplyMonitoring
  condition: succeeded()
  jobs:

  - job: PatchAndCommit
    pool:
      name: 'projectpool'

    steps:
    - checkout: self
      persistCredentials: false
      clean: true

    - bash: |
        git config user.email "$(GIT_EMAIL)"
        git config user.name  "$(GIT_USERNAME)"

        git remote set-url origin \
          https://$(GIT_USERNAME):$(GIT_TOKEN)@github.com/muzzammil-hamdu/bank-of-anthos.git

        echo "=== Patching Google registry → acrdev12345.azurecr.io ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i \
            -e "s|gcr.io/bank-of-anthos-ci/bank-of-anthos|acrdev12345.azurecr.io/bank-of-anthos|g" \
            -e "s|us-central1-docker.pkg.dev/bank-of-anthos-ci/bank-of-anthos-serverless|acrdev12345.azurecr.io/bank-of-anthos|g" \
          {} \;

        echo "=== Stamping build tag: $(imageTag) ==="
        find kubernetes-manifests/ -name "*.yaml" -exec \
          sed -i -E \
            "s|(acrdev12345\.azurecr\.io/bank-of-anthos/[^:]+):[^ ]+|\1:$(imageTag)|g" \
          {} \;

        git diff --stat

        if git diff --quiet; then
          echo "No changes — skipping commit."
        else
          git add kubernetes-manifests/
          git commit -m "ci: bump image tags to $(imageTag) [skip ci]"
          git push origin HEAD:main
          echo "✅ Pushed — ArgoCD will detect and sync automatically."
        fi
      displayName: 'Patch manifests & push to GitHub'


# ═══════════════════════════════════════════════════════════════════
# STAGE 5 — WAIT FOR ARGOCD SYNC & PRINT APP URL
# ═══════════════════════════════════════════════════════════════════
- stage: VerifySync
  displayName: '🔍 Wait for ArgoCD sync'
  dependsOn: UpdateManifests
  condition: succeeded()
  jobs:

  - job: WaitForSync
    pool:
      name: 'projectpool'

    steps:
    - task: AzureCLI@2
      displayName: 'Poll ArgoCD → Synced + Healthy'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group aks-dev-rg-west \
            --name aks-dev \
            --overwrite-existing

          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          ARGOCD_IP=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n argocd -o jsonpath='{.data.password}' | base64 -d)

          argocd login "$ARGOCD_IP" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          echo "=== Waiting for bank-of-anthos: Synced + Healthy ==="
          argocd app wait bank-of-anthos \
            --sync \
            --health \
            --timeout 600

          echo ""
          echo "=== Pod status ==="
          kubectl get pods -n bank-of-anthos

          echo ""
          echo "=== 🌐 App URL ==="
          for i in {1..20}; do
            IP=$(kubectl get svc frontend -n bank-of-anthos \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            [[ -n "$IP" ]] && echo "🚀 Bank of Anthos live at: http://$IP" && break
            echo "  Waiting for LoadBalancer IP... ($i/20)"
            sleep 15
          done
