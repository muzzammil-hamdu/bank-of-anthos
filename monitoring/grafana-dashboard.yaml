apiVersion: v1
kind: ConfigMap
metadata:
  name: bank-of-anthos-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"    # kube-prometheus-stack auto-imports dashboards with this label
data:
  bank-of-anthos.json: |
    {
      "title": "Bank of Anthos",
      "uid": "bank-of-anthos",
      "tags": ["bank-of-anthos", "kubernetes"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Pod Status",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "count(kube_pod_status_ready{namespace=\"bank-of-anthos\", condition=\"true\"} == 1)",
            "legendFormat": "Ready Pods"
          }],
          "options": {
            "colorMode": "background",
            "thresholds": {
              "steps": [
                { "color": "red", "value": 0 },
                { "color": "yellow", "value": 6 },
                { "color": "green", "value": 9 }
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "Pod Restarts (5m rate)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(rate(kube_pod_container_status_restarts_total{namespace=\"bank-of-anthos\"}[5m])) * 60",
            "legendFormat": "Restarts/min"
          }],
          "options": {
            "colorMode": "background",
            "thresholds": {
              "steps": [
                { "color": "green", "value": 0 },
                { "color": "yellow", "value": 0.1 },
                { "color": "red", "value": 1 }
              ]
            }
          }
        },
        {
          "id": 3,
          "title": "ArgoCD Sync Status",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "argocd_app_info{name=\"bank-of-anthos\"}",
            "legendFormat": "{{ sync_status }}"
          }]
        },
        {
          "id": 4,
          "title": "ArgoCD Health Status",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "argocd_app_info{name=\"bank-of-anthos\"}",
            "legendFormat": "{{ health_status }}"
          }]
        },
        {
          "id": 5,
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"bank-of-anthos\", container!=\"\", container!=\"POD\"}[5m])) by (pod)",
            "legendFormat": "{{ pod }}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 6,
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace=\"bank-of-anthos\", container!=\"\", container!=\"POD\"}) by (pod)",
            "legendFormat": "{{ pod }}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 7,
          "title": "Pod Restarts Over Time",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"bank-of-anthos\"}[1h])",
            "legendFormat": "{{ pod }}/{{ container }}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "id": 8,
          "title": "Deployment Available Replicas",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [{
            "expr": "kube_deployment_status_replicas_available{namespace=\"bank-of-anthos\"}",
            "legendFormat": "{{ deployment }}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "short", "min": 0 }
          }
        },
        {
          "id": 9,
          "title": "Active Alerts",
          "type": "alertlist",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 6 },
          "options": {
            "alertName": "BankOfAnthos",
            "dashboardAlerts": false,
            "stateFilter": {
              "firing": true,
              "pending": true,
              "noData": false,
              "error": true
            }
          }
        }
      ]
    }